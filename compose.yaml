name: techflow

services:
  trainer:
    build:
      context: .
      # Build-only workaround for daemon DNS/proxy setups. Runtime networking
      # remains the isolated Compose bridge below.
      network: host
    image: techflow:local
    hostname: techflow
    init: true
    stdin_open: true
    tty: true
    environment:
      TECHFLOW_HOME: /workspace
      TECHFLOW_PORT: "8888"
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 5s

volumes:
  workspace:
